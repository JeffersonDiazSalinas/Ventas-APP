<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Business</title>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#111;
--primary:#111;
--accent:#6366f1;
--soft:#e5e7eb;
}

body.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--primary:#f1f5f9;
--accent:#818cf8;
--soft:#334155;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

body{
background:var(--bg);
color:var(--text);
transition:0.3s;
}

header{
padding:18px;
text-align:center;
font-weight:600;
font-size:18px;
background:var(--primary);
color:var(--bg);
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
margin-bottom:20px;
}

button{
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin:5px 5px 5px 0;
font-size:14px;
transition:0.2s;
}

.btn-primary{background:var(--primary);color:var(--bg);}
.btn-accent{background:var(--accent);color:white;}
.btn-soft{background:var(--soft);color:var(--text);}

.section{display:none;}

.product{
background:var(--soft);
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:150px;
background:var(--soft);
padding:12px;
border-radius:12px;
text-align:center;
}

canvas{
max-height:300px;
}

@media(max-width:600px){
.stats{flex-direction:column;}
}
</style>
</head>
<body>

<header>
💼 Ventas Business
<button onclick="toggleDark()" class="btn-soft">🌙</button>
</header>

<div class="container">

<div id="menu">
<div class="card">
<button class="btn-primary" onclick="showSection('registro')">Registrar Venta</button>
<button class="btn-accent" onclick="showSection('historial')">Dashboard</button>
</div>
</div>

<div id="registro" class="section">
<div class="card">
<h3>Nueva Venta</h3>
<div id="productList"></div>
<button class="btn-primary" onclick="validarVenta()">Validar</button>
</div>
<div id="resumen"></div>
<button id="btnGuardar" class="btn-accent" style="display:none;" onclick="guardarVenta()">Guardar</button>
<button class="btn-soft" onclick="showSection('menu')">Volver</button>
</div>

<div id="historial" class="section">

<div class="card">
<h3>Estadísticas</h3>
<div class="stats" id="estadisticas"></div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

<div id="historialContenido"></div>

<button class="btn-soft" onclick="showSection('menu')">Volver</button>

</div>

</div>

<script>
const productosBase=["Aretes","Gorras","Brillos","Bolitrones","Slime",
"Juguete Grande","Juguete Dinosaurio","Trompo","Balaca","Bolso","Cauchos"];

let productos=[];
let ventaTemp=null;
let chart=null;

function generarProductos(){
productos=productosBase.map(p=>({
nombre:p,
precio:Math.floor(Math.random()*20000)+3000
}));
}

function mostrarProductos(){
let cont=document.getElementById("productList");
cont.innerHTML="";
productos.forEach((p,i)=>{
cont.innerHTML+=`
<div class="product">
<label>
<input type="checkbox" onchange="toggleCantidad(${i})">
${p.nombre} - $${p.precio.toLocaleString()}
</label>
<div id="cant-${i}" style="display:none;">
Cantidad <input type="number" min="1" value="1">
</div>
</div>`;
});
}

function toggleCantidad(i){
let check=document.querySelectorAll("#productList input[type=checkbox]")[i];
document.getElementById("cant-"+i).style.display=
check.checked?"block":"none";
}

function validarVenta(){
let items=[],total=0;
document.querySelectorAll("#productList input[type=checkbox]").forEach((c,i)=>{
if(c.checked){
let cant=parseInt(document.querySelector(`#cant-${i} input`).value);
let subtotal=cant*productos[i].precio;
total+=subtotal;
items.push({nombre:productos[i].nombre,cantidad:cant,subtotal});
}
});
if(items.length===0){alert("Selecciona productos");return;}
ventaTemp={id:Date.now(),fecha:new Date().toISOString().split("T")[0],items,total};
let html=`<div class="card"><h3>Resumen</h3>`;
items.forEach(it=>html+=`<p>${it.nombre} x${it.cantidad} - $${it.subtotal.toLocaleString()}</p>`);
html+=`<strong>Total: $${total.toLocaleString()}</strong></div>`;
document.getElementById("resumen").innerHTML=html;
document.getElementById("btnGuardar").style.display="inline-block";
}

function guardarVenta(){
let historial=JSON.parse(localStorage.getItem("ventasBusiness"))||[];
historial.push(ventaTemp);
localStorage.setItem("ventasBusiness",JSON.stringify(historial));
ventaTemp=null;
document.getElementById("resumen").innerHTML="";
document.getElementById("btnGuardar").style.display="none";
generarProductos();
mostrarProductos();
alert("Venta guardada ✅");
}

function mostrarHistorial(){
let historial=JSON.parse(localStorage.getItem("ventasBusiness"))||[];
let cont=document.getElementById("historialContenido");
cont.innerHTML="";
if(historial.length===0){
cont.innerHTML="<div class='card'>No hay ventas.</div>";
return;
}

let totalGeneral=0;
let ventasPorDia={};

historial.forEach(v=>{
totalGeneral+=v.total;
if(!ventasPorDia[v.fecha]) ventasPorDia[v.fecha]=0;
ventasPorDia[v.fecha]+=v.total;

let card=`<div class="card"><h4>${v.fecha}</h4>`;
v.items.forEach(it=>{
card+=`<p>${it.nombre} x${it.cantidad} - $${it.subtotal.toLocaleString()}</p>`;
});
card+=`<strong>Total: $${v.total.toLocaleString()}</strong></div>`;
cont.innerHTML+=card;
});

document.getElementById("estadisticas").innerHTML=`
<div class="stat"><strong>Total Ventas</strong><br>${historial.length}</div>
<div class="stat"><strong>Total General</strong><br>$${totalGeneral.toLocaleString()}</div>
`;

crearGrafica(ventasPorDia);
}

function crearGrafica(data){
let ctx=document.getElementById("grafica").getContext("2d");
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(data),
datasets:[{
label:"Ventas por Día",
data:Object.values(data),
backgroundColor:"#6366f1"
}]
},
options:{responsive:true}
});
}

function showSection(id){
document.getElementById("menu").style.display="none";
document.getElementById("registro").style.display="none";
document.getElementById("historial").style.display="none";

if(id==="menu") document.getElementById("menu").style.display="block";
if(id==="registro"){
document.getElementById("registro").style.display="block";
generarProductos();
mostrarProductos();
}
if(id==="historial"){
document.getElementById("historial").style.display="block";
mostrarHistorial();
}
}

function toggleDark(){
document.body.classList.toggle("dark");
}

if(window.matchMedia('(prefers-color-scheme: dark)').matches){
document.body.classList.add("dark");
}

showSection("menu");
</script>

</body>
</html>

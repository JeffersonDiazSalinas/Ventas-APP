<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Business</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f7;
    padding: 20px;
}

h1 {
    text-align: center;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-bottom: 30px;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #6366f1;
    color: white;
}

button {
    padding: 10px 15px;
    background: #6366f1;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.9;
}

canvas {
    background: white;
    padding: 20px;
}
</style>
</head>
<body>

<h1>Inventario de Productos</h1>

<button onclick="reiniciarPrecios()">Generar Nuevos Precios</button>

<table id="tablaProductos">
<thead>
<tr>
<th>Producto</th>
<th>Precio</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<canvas id="grafica"></canvas>

<script>
const nombresProductos = [
"Juguete Grande",
"Juguete Dinosaurio",
"Trompo",
"Lego",
"Slime",
"Telefono",
"Paq. Piquis",
"Burbujas",
"Gorras",
"Aretes",
"Balones grandes",
"Balones Pequeños",
"Caimanes",
"Juguete Kuromi",
"Pilas",
"Balacas",
"Espejos",
"Bolso Mujer",
"Bolso Hombre",
"Hilos",
"Moñas",
"Pollos",
"Alcancia Grande",
"Alcancia pequeña",
"Termo Caliente",
"Vaso Niños",
"Muñecas"
];

function generarPrecio() {
    return Math.floor(Math.random() * (30000 - 1000 + 1)) + 1000;
}

function obtenerProductos() {
    let productosGuardados = localStorage.getItem("productos");

    if (productosGuardados) {
        return JSON.parse(productosGuardados);
    } else {
        const productos = nombresProductos.map(nombre => ({
            nombre: nombre,
            precio: generarPrecio()
        }));

        localStorage.setItem("productos", JSON.stringify(productos));
        return productos;
    }
}

function reiniciarPrecios() {
    localStorage.removeItem("productos");
    location.reload();
}

function mostrarProductos(productos) {
    const tbody = document.querySelector("#tablaProductos tbody");
    tbody.innerHTML = "";

    productos.forEach(prod => {
        const fila = `
            <tr>
                <td>${prod.nombre}</td>
                <td>$${prod.precio.toLocaleString()}</td>
            </tr>
        `;
        tbody.innerHTML += fila;
    });
}

function crearGrafica(productos) {
    const ctx = document.getElementById("grafica");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: productos.map(p => p.nombre),
            datasets: [{
                label: "Precio",
                data: productos.map(p => p.precio)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            }
        }
    });
}

const productos = obtenerProductos();
mostrarProductos(productos);
crearGrafica(productos);
</script>

</body>
</html>

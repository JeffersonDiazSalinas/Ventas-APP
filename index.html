<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Ventas</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 20px;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

select, input, button {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.9;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #2563eb;
    color: white;
}

.total {
    font-size: 20px;
    font-weight: bold;
    color: green;
}
</style>
</head>
<body>

<h1>Sistema de Ventas</h1>

<div class="card">
    <h3>Registrar Venta</h3>
    <select id="productoSelect"></select>
    <input type="number" id="cantidad" placeholder="Cantidad" min="1">
    <button onclick="registrarVenta()">Registrar Venta</button>
</div>

<div class="card">
    <h3>Dashboard</h3>
    <p>Total vendido:</p>
    <p class="total" id="totalVendido">$0</p>
</div>

<div class="card">
    <h3>Historial de Ventas</h3>
    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="historial"></tbody>
    </table>
</div>

<script>
// ===== NUEVOS PRODUCTOS =====
const nombresProductos = [
"Juguete Grande",
"Juguete Dinosaurio",
"Trompo",
"Lego",
"Slime",
"Telefono",
"Paq. Piquis",
"Burbujas",
"Gorras",
"Aretes",
"Balones grandes",
"Balones Pequeños",
"Caimanes",
"Juguete Kuromi",
"Pilas",
"Balacas",
"Espejos",
"Bolso Mujer",
"Bolso Hombre",
"Hilos",
"Moñas",
"Pollos",
"Alcancia Grande",
"Alcancia pequeña",
"Termo Caliente",
"Vaso Niños",
"Muñecas"
];

function generarPrecio() {
    return Math.floor(Math.random() * (30000 - 1000 + 1)) + 1000;
}

// Obtener productos guardados o crearlos
let productos = JSON.parse(localStorage.getItem("productos"));
if (!productos) {
    productos = nombresProductos.map(nombre => ({
        nombre: nombre,
        precio: generarPrecio()
    }));
    localStorage.setItem("productos", JSON.stringify(productos));
}

// Obtener ventas guardadas
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

// Cargar productos en el select
function cargarProductos() {
    const select = document.getElementById("productoSelect");
    select.innerHTML = "";
    productos.forEach((prod, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = prod.nombre + " - $" + prod.precio.toLocaleString();
        select.appendChild(option);
    });
}

// Registrar venta
function registrarVenta() {
    const index = document.getElementById("productoSelect").value;
    const cantidad = parseInt(document.getElementById("cantidad").value);

    if (!cantidad || cantidad <= 0) {
        alert("Ingresa una cantidad válida");
        return;
    }

    const producto = productos[index];
    const total = producto.precio * cantidad;

    const venta = {
        producto: producto.nombre,
        cantidad: cantidad,
        total: total
    };

    ventas.push(venta);
    localStorage.setItem("ventas", JSON.stringify(ventas));

    document.getElementById("cantidad").value = "";
    mostrarVentas();
}

// Mostrar historial
function mostrarVentas() {
    const tbody = document.getElementById("historial");
    tbody.innerHTML = "";

    let totalGeneral = 0;

    ventas.forEach(v => {
        totalGeneral += v.total;

        const fila = `
            <tr>
                <td>${v.producto}</td>
                <td>${v.cantidad}</td>
                <td>$${v.total.toLocaleString()}</td>
            </tr>
        `;
        tbody.innerHTML += fila;
    });

    document.getElementById("totalVendido").textContent = "$" + totalGeneral.toLocaleString();
}

cargarProductos();
mostrarVentas();
</script>

</body>
</html>
